version: '3.8'
services:
  db:
    image: mysql:5.6
    container_name: orthocertificatedb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mysql123
      MYSQL_DATABASE: db_ortho_event
      MYSQL_USER: orthoevent
      MYSQL_PASSWORD: OrthoEventHitpL2026
    ports:
      - "3323:3306" 
    volumes:
      - ./ortho.sql:/docker-entrypoint-initdb.d/ortho.sql
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
    networks:
      - orthocertificate26-network-certificate
    healthcheck:
      test: ["CMD-SHELL", "mysql -u root -pmysql123 -e 'SELECT 1'"]
      interval: 10s     
      retries: 10
      start_period: 40s

  tomcat:
    build:
      context: .  
    image: orthocertificate:latest
    container_name: orthocertificateapp 
    restart: always
    depends_on:
      db:
        condition: service_healthy  
    networks:
      - orthocertificate26-network-certificate
    ports:
      - "9323:8080"
    mem_limit: 512m
    environment:
      MYSQL_HOST: db    
      MYSQL_PORT: 3306
      MYSQL_DB: db_ortho_event
      MYSQL_USER: orthoevent
      MYSQL_PASSWORD: OrthoEventHitpL2026

networks:
  orthocertificate26-network-certificate:
    driver: bridge  
